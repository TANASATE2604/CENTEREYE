body{font-family:'Sarabun',sans-serif;background:#f0ece4;color:#2c2418}
.app{min-height:100vh;display:flex;flex-direction:column}
.hdr{background:#fff;border-bottom:1px solid #ddd6cc;padding:0 18px;display:flex;align-items:center;gap:12px;height:58px;box-shadow:0 1px 4px rgba(44,36,24,.07);position:sticky;top:0;z-index:100}
.hdr-logo{width:34px;height:34px;background:#f3f0ea;border-radius:50%;border:1.5px solid #e0d8ce;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.hdr-name{font-size:17px;font-weight:700;color:#2c2418;flex:1}
.hdr-sub{font-size:11px;color:#8c7d6b;display:block}
.btn-new{background:#7a6650;color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-new:hover{background:#6b5741}
.main{flex:1;padding:16px;max-width:960px;margin:0 auto;width:100%}
.searchbar{display:flex;gap:10px;margin-bottom:16px;align-items:center}
.searchin{flex:1;padding:9px 13px;border:1px solid #ddd6cc;border-radius:7px;font-size:14px;font-family:inherit;background:#fff;color:#2c2418}
.searchin:focus{outline:none;border-color:#7a6650}
.rec-count{color:#8c7d6b;font-size:12px;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.empty{text-align:center;padding:70px 20px;color:#8c7d6b}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-t{font-size:15px;font-weight:600;color:#2c2418;margin-bottom:4px}
.card{background:#fff;border-radius:10px;border:1px solid #ddd6cc;overflow:hidden;box-shadow:0 1px 4px rgba(44,36,24,.05);transition:all .2s}
.card:hover{border-color:#7a6650;box-shadow:0 4px 16px rgba(122,102,80,.13);transform:translateY(-2px)}
.card-top{background:#f3f0ea;border-bottom:1px solid #ddd6cc;padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.card-av{width:36px;height:36px;border-radius:50%;background:#e8e2d9;border:1.5px solid #c9bfad;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#7a6650;flex-shrink:0}
.card-name{font-weight:600;font-size:14px;color:#2c2418}
.card-date{font-size:11px;color:#8c7d6b}
.card-body{padding:10px 14px;cursor:pointer}
.card-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.chip{font-size:11px;padding:2px 9px;border-radius:20px;background:#f3f0ea;color:#7a6650;font-weight:600;border:1px solid #ddd6cc}
.chip.g{background:#edf6f0;color:#4a7c59;border-color:#c5dfc9}
.card-ph{font-size:12px;color:#8c7d6b;margin-top:2px}
.card-acts{display:flex;border-top:1px solid #ddd6cc}
.card-btn{flex:1;border:none;background:none;padding:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:#8c7d6b;transition:all .15s}
.card-btn:hover{background:#f3f0ea;color:#7a6650}
.card-btn.del:hover{background:#fef2f2;color:#a83232}
.card-btn+.card-btn{border-left:1px solid #ddd6cc}
.fwrap{background:#fff;border-radius:12px;border:1px solid #ddd6cc;overflow:hidden;box-shadow:0 2px 10px rgba(44,36,24,.06)}
.fhdr{background:#f3f0ea;border-bottom:1px solid #ddd6cc;padding:13px 20px;display:flex;align-items:center;gap:12px}
.ftitle{color:#2c2418;font-size:16px;font-weight:700;flex:1}
.btn-back{background:#fff;color:#8c7d6b;border:1px solid #ddd6cc;border-radius:6px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-back:hover{border-color:#7a6650;color:#7a6650}
.sec{padding:16px 20px;border-bottom:1px solid #e8e2d9;background:#fdfcf9}
.sec:nth-child(even){background:#fff}
.sec:last-child{border-bottom:none}
.sec-title{font-size:14px;font-weight:700;color:#2c2418;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.sec-num{width:23px;height:23px;border-radius:50%;background:#7a6650;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;font-weight:600;color:#8c7d6b;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{padding:8px 11px;border:1px solid #ddd6cc;border-radius:6px;font-size:14px;font-family:inherit;color:#2c2418;background:#fff;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#7a6650;background:#faf8f4}
.field textarea{resize:vertical;min-height:70px}
.plabel{font-size:12px;font-weight:600;color:#7a6650;margin-bottom:6px;background:#f3f0ea;padding:5px 11px;border-radius:5px;border-left:3px solid #7a6650}
.tscroll{overflow-x:auto;margin-bottom:12px}
.ptable{width:100%;border-collapse:collapse;min-width:580px}
.ptable th{background:#7a6650;color:#fff;padding:7px 5px;font-size:11px;text-align:center;white-space:nowrap}
.ptable td{border:1px solid #ddd6cc;padding:3px}
.eye-lbl{font-size:12px;font-weight:600;color:#7a6650;padding:6px 10px !important;background:#f3f0ea;white-space:nowrap}
.tin{width:100%;border:none;padding:5px 4px;text-align:center;font-size:13px;font-family:inherit;background:transparent;color:#2c2418}
.tin:focus{outline:1.5px solid #7a6650;border-radius:4px;background:#faf8f4}
.fit-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:4px}
.fit-item{display:flex;align-items:center;gap:7px}
.fit-item label{font-size:13px;font-weight:600;color:#2c2418}
.fit-in{width:74px;padding:7px 8px;border:1px solid #ddd6cc;border-radius:6px;font-size:14px;font-family:inherit;text-align:center;background:#fff}
.fit-in:focus{outline:none;border-color:#7a6650;background:#faf8f4}
.fit-unit{font-size:12px;color:#8c7d6b}
.tog-row{display:flex;gap:8px;flex-wrap:wrap}
.tog-btn{padding:7px 16px;border-radius:7px;border:1px solid #ddd6cc;background:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:#8c7d6b;transition:all .15s}
.tog-btn.on{background:#7a6650;border-color:#7a6650;color:#fff}
.tog-btn:hover:not(.on){border-color:#7a6650;color:#7a6650;background:#faf8f4}
.chk-row{display:flex;flex-direction:column;gap:2px}
.chk-lbl{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:3px 0;user-select:none}
.chk-box{width:17px;height:17px;border-radius:4px;border:1.5px solid #c9bfad;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer}
.chk-box.on{background:#7a6650;border-color:#7a6650}
.chk-tick{color:#fff;font-size:10px;font-weight:800}
.chk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:2px}
.other-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.other-lbl{font-size:13px;color:#8c7d6b;white-space:nowrap}
.other-in{flex:1;max-width:240px;padding:5px 10px;border:1px solid #ddd6cc;border-radius:6px;font-size:13px;font-family:inherit;background:#fff}
.other-in:focus{outline:none;border-color:#7a6650}
.price-tbl{width:100%;border-collapse:collapse}
.price-tbl tr td{padding:6px 0;border-bottom:1px dashed #ddd6cc}
.price-tbl tr:last-child td{border-bottom:none;font-weight:700}
.price-tbl td:first-child{font-size:13px;color:#2c2418;width:130px}
.price-tbl td:last-child{display:flex;align-items:center;gap:6px}
.price-in{flex:1;padding:7px 9px;border:1px solid #ddd6cc;border-radius:6px;font-size:14px;font-family:inherit;text-align:right;background:#fff}
.price-in:focus{outline:none;border-color:#7a6650;background:#faf8f4}
.price-unit{font-size:13px;color:#8c7d6b}
.save-row{padding:16px 20px;display:flex;justify-content:flex-end;gap:10px;background:#f3f0ea;border-top:1px solid #ddd6cc}
.btn-save{background:#7a6650;color:#fff;border:none;border-radius:8px;padding:10px 26px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s;display:flex;align-items:center;gap:7px}
.btn-save:hover{background:#6b5741;transform:translateY(-1px)}
.btn-save:disabled{opacity:.6;cursor:default;transform:none}
.btn-cancel{background:#fff;color:#8c7d6b;border:1px solid #ddd6cc;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

.dwrap{background:#fff;border-radius:12px;border:1px solid #ddd6cc;overflow:hidden}
.dhdr{background:#f3f0ea;border-bottom:1px solid #ddd6cc;padding:16px 20px}
.dname{color:#2c2418;font-size:20px;font-weight:700}
.dmeta{color:#8c7d6b;font-size:13px;margin-top:3px}
.dacts{margin-top:11px;display:flex;gap:8px}

.btn-edit:hover{border-color:#7a6650;background:#faf8f4}
.btn-del{background:#fef2f2;color:#a83232;border:1px solid #fecaca;border-radius:6px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}

.photo-del{position:absolute;top:6px;right:6px;background:rgba(168,50,50,.85);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.photo-input{display:none}

  .main{padding:12px}
  .sec{padding:13px 14px}
  .fg{grid-template-columns:1fr}

.bar-bg{flex:1;height:8px;background:#f0ece4;border-radius:4px;overflow:hidden;min-width:60px;}

</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const STORAGE_KEY = "center-eye-records";
const BASE_KEY = "center-eye-base";

const initialForm = {
  name:"",age:"",gender:"",phone:"",note:"",date:"",
  prev_r_sph:"",prev_r_cyl:"",prev_r_axis:"",prev_r_add:"",prev_r_pd:"",prev_r_npd:"",prev_r_prism:"",prev_r_base:"",

  cur_l_sph:"",cur_l_cyl:"",cur_l_axis:"",cur_l_add:"",cur_l_pd:"",cur_l_npd:"",cur_l_prism:"",cur_l_base:"",

  lens_single:false,lens_progressive:false,lens_bifocal:false,lens_office:false,lens_cr39:false,lens_other:"",
  mat_cr39:false,mat_poly:false,mat_156:false,mat_160:false,mat_167:false,mat_other:"",
  usage:"",
  coat_ar:false,coat_scratch:false,coat_blue:false,coat_photo:false,coat_uv:false,coat_other:"",
  price_frame:"",price_lens:"",price_discount:"",price_deposit:"",price_balance:"",extra_note:"",
  photo1:"",photo2:"",
};

const FRAME_TYPES = ["กรอบเต็ม","กรอบเซาะ","กรอบเจาะ"];
const USAGE_TYPES = ["มองใกล้","มองไกล","ทั้ง 2 ระยะ"];
const PF = ["sph","cyl","axis","add","pd","npd","prism","base"];
const PH = ["SPH","CYL","AXIS","ADD","PD","NPD","PRISM","BASE"];

function Chk({label,checked,onChange}){
  return (
    <label className="chk-lbl">
      <span className={"chk-box"+(checked?" on":"")} onClick={onChange}>
        {checked && <span className="chk-tick">✓</span>}
      </span>
      {label}
    </label>
  );
}

function PresTable({prefix,label,form,onChange}){
  return (
    <div>
      <div className="plabel">{label}</div>
      <div className="tscroll">
        <table className="ptable">
          <thead><tr><th>ตา</th>{PH.map(h=><th key={h}>{h}</th>)}</tr></thead>
          <tbody>
            {["r","l"].map(eye=>(
              <tr key={eye}>
                <td className="eye-lbl">{eye==="r"?"R (ขวา)":"L (ซ้าย)"}</td>
                {PF.map(f=>(
                  <td key={f}>
                    <input className="tin" value={form[prefix+"_"+eye+"_"+f]}
                      onChange={e=>onChange(prefix+"_"+eye+"_"+f,e.target.value)} />
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}


function SummaryPage({records}){
  const [yearFilter, setYearFilter] = React.useState("all");
  const THAI_MONTHS=["","ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  function parseDate(d){
    if(!d||d.length!==10) return null;
    const p=d.split("/"); if(p.length!==3) return null;
    return {day:parseInt(p[0]),month:parseInt(p[1]),year:parseInt(p[2])};
  }
  const years=[...new Set(records.map(r=>{const p=parseDate(r.date);return p?p.year:null}).filter(Boolean))].sort();
  const monthData={};
  records.forEach(r=>{
    const p=parseDate(r.date); if(!p) return;
    if(yearFilter!=="all"&&p.year!==parseInt(yearFilter)) return;
    const key=`${p.year}-${String(p.month).padStart(2,"0")}`;
    if(!monthData[key]) monthData[key]={key,year:p.year,month:p.month,total:0,count:0};
    const price=parseFloat(r.price_deposit||r.price_lens||0)||0;
    monthData[key].total+=price; monthData[key].count+=1;
  });
  const rows=Object.values(monthData).sort((a,b)=>a.key.localeCompare(b.key));
  const grandTotal=rows.reduce((s,r)=>s+r.total,0);
  const grandCount=rows.reduce((s,r)=>s+r.count,0);
  const maxTotal=rows.length?Math.max(...rows.map(r=>r.total)):1;
  const avgMonthly=rows.length?grandTotal/rows.length:0;
  const bestMonth=rows.length?rows.reduce((a,b)=>a.total>b.total?a:b):null;
  const uniquePhones=new Set(records.filter(r=>{
    if(yearFilter==="all") return true;
    const p=parseDate(r.date); return p&&p.year===parseInt(yearFilter);
  }).map(r=>r.phone).filter(Boolean)).size;
  return (
    <div className="sum-wrap">
      <div className="sum-kpi">
        <div className="kpi-card"><div className="kpi-label">ยอดรวม</div><div className="kpi-val">฿{grandTotal.toLocaleString()}</div><div className="kpi-sub">{grandCount.toLocaleString()} รายการ</div></div>
        <div className="kpi-card"><div className="kpi-label">เฉลี่ย/เดือน</div><div className="kpi-val">฿{Math.round(avgMonthly).toLocaleString()}</div><div className="kpi-sub">{rows.length} เดือน</div></div>
        <div className="kpi-card"><div className="kpi-label">เดือนสูงสุด</div><div className="kpi-val" style={{fontSize:15}}>{bestMonth?`${THAI_MONTHS[bestMonth.month]} ${bestMonth.year}`:"-"}</div><div className="kpi-sub">{bestMonth?"฿"+bestMonth.total.toLocaleString():""}</div></div>
        <div className="kpi-card"><div className="kpi-label">ลูกค้า (เบอร์ไม่ซ้ำ)</div><div className="kpi-val">{uniquePhones.toLocaleString()}</div><div className="kpi-sub">ราย</div></div>
      </div>
      <div className="sum-section">
        <div className="sum-sec-hdr">📊 ยอดขายรายเดือน</div>
        <div className="sum-filter">
          <span className="filter-lbl">ปี:</span>
          <select className="filter-sel" value={yearFilter} onChange={e=>setYearFilter(e.target.value)}>
            <option value="all">ทั้งหมด</option>
            {years.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
        </div>
        <div style={{overflowX:"auto"}}>
          <table className="month-table">
            <thead><tr><th>เดือน</th><th>รายการ</th><th>ยอดขาย (บาท)</th><th style={{minWidth:120}}>เปรียบเทียบ</th></tr></thead>
            <tbody>
              {rows.map(row=>(
                <tr key={row.key}>
                  <td style={{fontWeight:600}}>{THAI_MONTHS[row.month]} {row.year}</td>
                  <td>{row.count.toLocaleString()}</td>
                  <td style={{fontWeight:600,color:"#4a7c59"}}>฿{row.total.toLocaleString()}</td>
                  <td><div className="bar-wrap"><div className="bar-bg"><div className="bar-fill" style={{width:(row.total/maxTotal*100)+"%"}}></div></div><span style={{fontSize:11,color:"#8c7d6b",whiteSpace:"nowrap"}}>{Math.round(row.total/maxTotal*100)}%</span></div></td>
                </tr>
              ))}
              {rows.length>0&&<tr className="total-row"><td>รวม</td><td>{grandCount.toLocaleString()}</td><td style={{color:"#7a6650"}}>฿{grandTotal.toLocaleString()}</td><td></td></tr>}
              {rows.length===0&&<tr><td colSpan="4" style={{textAlign:"center",padding:"30px",color:"#8c7d6b"}}>ไม่มีข้อมูล</td></tr>}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [records,setRecords] = useState(()=>{
    try{
      const base=JSON.parse(localStorage.getItem(BASE_KEY)||"[]");
      const user=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
      // Merge: user records override base records with same id
      const map={};
      base.forEach(r=>map[r.id]=r);
      user.forEach(r=>map[r.id]=r);
      return Object.values(map).sort((a,b)=>a.id-b.id);
    }catch(_){return [];}
  });
  const [form,setForm] = useState(initialForm);
  const [view,setView] = useState("list");
  const [selected,setSelected] = useState(null);
  const [search,setSearch] = useState("");
  const [saving,setSaving] = useState(false);
  const [tab,setTab] = useState('list');

  const persist = (list) => {
    try{
      // Save only new/edited records (id>=20000) to STORAGE_KEY
      // Also save any base records that were edited (mark by checking against base)
      const base=JSON.parse(localStorage.getItem(BASE_KEY)||"[]");
      const baseIds=new Set(base.map(r=>r.id));
      const userRecords=list.filter(r=>!baseIds.has(r.id));
      localStorage.setItem(STORAGE_KEY,JSON.stringify(userRecords));
    }catch(_){}
  };

  const [toast,setToast] = useState("");
  const showToast = (msg) => {
    setToast(msg);
    setTimeout(()=>setToast(""),2500);
  };

  const handleExport = () => {
    try{
      const data = JSON.stringify(records, null, 2);
      const blob = new Blob([data],{type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const now = new Date();
      const stamp = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}`;
      a.href = url; a.download = `center-eye-backup-${stamp}.json`;
      a.click(); URL.revokeObjectURL(url);
      showToast("✅ Export สำเร็จ! บันทึกไฟล์ไว้ได้เลย");
    }catch(e){ showToast("❌ Export ไม่สำเร็จ"); }
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try{
        const imported = JSON.parse(ev.target.result);
        if(!Array.isArray(imported)) throw new Error("invalid");
        // Merge: imported overrides existing by id
        const map={};
        records.forEach(r=>map[r.id]=r);
        imported.forEach(r=>map[r.id]=r);
        const merged = Object.values(map).sort((a,b)=>a.id-b.id);
        // Save user records
        const base=JSON.parse(localStorage.getItem(BASE_KEY)||"[]");
        const baseIds=new Set(base.map(r=>r.id));
        const userRecords=merged.filter(r=>!baseIds.has(r.id));
        localStorage.setItem(STORAGE_KEY,JSON.stringify(userRecords));
        setRecords(merged);
        showToast(`✅ Import สำเร็จ! ${imported.length} รายการ`);
      }catch(err){ showToast("❌ ไฟล์ไม่ถูกต้อง"); }
    };
    reader.readAsText(file);
    e.target.value="";
  };

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const tog = (k) => setForm(f=>({...f,[k]:!f[k]}));
  const goBack = () => { setView("list"); setSelected(null); setForm(initialForm); };

  const handleSave = () => {
    if(!form.name.trim()) return;
    setSaving(true);
    const list = selected!==null
      ? records.map((r,i)=>i===selected?{...form,id:r.id}:r)
      : [...records,{...form,id:Date.now()}];
    persist(list);
    setRecords(list);
    setSaving(false);
    goBack();
  };

  const handleDelete = (idx) => {
    const list = records.filter((_,i)=>i!==idx);
    persist(list);
    setRecords(list);
    if(view==="detail") goBack();
  };

  const filtered = records.filter(r=>
    r.name.toLowerCase().includes(search.toLowerCase())||r.phone.includes(search)
  );

  return (
    <div className="app">
      <header className="hdr">
        <div className="hdr-logo">👁️</div>
        <div style={{flex:1}}>
          <div className="hdr-name">CENTER EYE</div>
          <span className="hdr-sub">ระบบจัดการประวัติลูกค้าแว่นตา</span>
        </div>
        {view==="list" && tab==="list" && (
          <button className="btn-new" onClick={()=>{
            setForm({...initialForm,date:new Date().toLocaleDateString("th-TH")});
            setSelected(null); setView("form");
          }}>+ เพิ่มลูกค้า</button>
        )}
      </header>
      <nav className="nav-tabs">
        <button className={"nav-tab"+(tab==="list"?" on":"")} onClick={()=>setTab("list")}>👤 ลูกค้า</button>
        <button className={"nav-tab"+(tab==="summary"?" on":"")} onClick={()=>setTab("summary")}>📊 สรุปยอดขาย</button>
      </nav>
      <div className="io-bar">
        <button className="btn-export" onClick={handleExport}>💾 Export ข้อมูล</button>
        <label className="btn-import">
          📂 Import ข้อมูล
          <input type="file" accept=".json" style={{display:"none"}} onChange={handleImport}/>
        </label>
      </div>
      <div className={"io-toast"+(toast?" show":"")}>{toast}</div>

      <main className="main">
        {tab==="summary" && <SummaryPage records={records} />}
        {tab==="list" && <>}

        {/* LIST */}
        {view==="list" && (
          <>
            <div className="searchbar">
              <input className="searchin" placeholder="🔍  ค้นหาชื่อหรือเบอร์โทร..."
                value={search} onChange={e=>setSearch(e.target.value)} />
              <span className="rec-count">{filtered.length} ราย</span>
            </div>
            {filtered.length===0 ? (
              <div className="empty">
                <div className="empty-ico">👓</div>
                <div className="empty-t">{records.length===0?"ยังไม่มีข้อมูลลูกค้า":"ไม่พบข้อมูล"}</div>
                <div style={{fontSize:13}}>{records.length===0?"กด + เพิ่มลูกค้า เพื่อเริ่มต้น":"ลองค้นหาด้วยคำอื่น"}</div>
              </div>
            ) : (
              <div className="grid">
                {filtered.map(rec=>{
                  const idx=records.indexOf(rec);
                  return (
                    <div className="card" key={rec.id}>
                      <div className="card-top" onClick={()=>{setSelected(idx);setView("detail");}}>
                        <div className="card-av">{rec.name[0]}</div>
                        <div>
                          <div className="card-name">{rec.name}</div>
                          <div className="card-date">{rec.date||"—"} · อายุ {rec.age||"—"} ปี</div>
                        </div>
                      </div>
                      <div className="card-body" onClick={()=>{setSelected(idx);setView("detail");}}>
                        <div className="card-chips">
                          {rec.usage&&<span className="chip g">{rec.usage}</span>}
                          {rec.frame_type&&<span className="chip">{rec.frame_type}</span>}
                          {rec.lens_single&&<span className="chip">Single</span>}
                          {rec.lens_progressive&&<span className="chip">Progressive</span>}
                          {rec.lens_bifocal&&<span className="chip">Bifocal</span>}
                          {rec.lens_office&&<span className="chip">Office</span>}
                          {rec.lens_cr39&&<span className="chip">CR-39</span>}
                        </div>
                        <div className="card-ph">📞 {rec.phone||"ไม่ระบุ"}</div>
                      </div>
                      <div className="card-acts">
                        <button className="card-btn" onClick={()=>{setSelected(idx);setView("detail");}}>ดูข้อมูล</button>
                        <button className="card-btn" onClick={()=>{setForm(rec);setSelected(idx);setView("form");}}>แก้ไข</button>
                        <button className="card-btn del" onClick={()=>handleDelete(idx)}>ลบ</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </>
        )}

        {/* FORM */}
        {view==="form" && (
          <div className="fwrap">
            <div className="fhdr">
              <div className="ftitle">{selected!==null?"✏️ แก้ไขข้อมูลลูกค้า":"➕ เพิ่มลูกค้าใหม่"}</div>
              <button className="btn-back" onClick={goBack}>← กลับ</button>
            </div>

            {/* 1 */}
            <div className="sec">
              <div className="sec-title"><span className="sec-num">1</span>ข้อมูลลูกค้า</div>
              <div className="fg">
                <div className="field" style={{gridColumn:"span 2"}}>
                  <label>ชื่อ-สกุล *</label>
                  <input value={form.name} onChange={e=>set("name",e.target.value)} placeholder="ชื่อ-นามสกุล" />
                </div>
                <div className="field">
                  <label>วันที่</label>
                  <input value={form.date} onChange={e=>set("date",e.target.value)} placeholder="วว/ดด/ปปปป" />
                </div>
                <div className="field">
                  <label>อายุ (ปี)</label>
                  <input type="number" value={form.age} onChange={e=>set("age",e.target.value)} placeholder="อายุ" />
                </div>
                <div className="field">
                  <label>เพศ</label>
                  <select value={form.gender} onChange={e=>set("gender",e.target.value)}>
                    <option value="">-- เลือก --</option>
                    <option>ชาย</option><option>หญิง</option><option>ไม่ระบุ</option>
                  </select>
                </div>
                <div className="field">
                  <label>เบอร์โทร</label>
                  <input value={form.phone} onChange={e=>set("phone",e.target.value)} placeholder="0xx-xxx-xxxx" />
                </div>
                <div className="field" style={{gridColumn:"span 2"}}>
                  <label>หมายเหตุ</label>
                  <input value={form.note} onChange={e=>set("note",e.target.value)} placeholder="หมายเหตุ" />
                </div>
              </div>
            </div>

            {/* 2 */}
            <div className="sec">
              <div className="sec-title"><span className="sec-num">2</span>ค่าสายตา (หน่วย: มิลลิเมตร)</div>
              <PresTable prefix="prev" label="ค่าสายตาเดิม (Previous Prescription)" form={form} onChange={set} />
              <PresTable prefix="cur" label="ค่าสายตาใหม่ (Current Prescription)" form={form} onChange={set} />
              <div className="sub">📏 Fitting Height</div>
              <div className="fit-row">
                {[["r","ขวา (R)"],["l","ซ้าย (L)"]].map(([eye,lbl])=>(
                  <div className="fit-item" key={eye}>
                    <label>{lbl}</label>
                    <input className="fit-in" value={form["fitting_height_"+eye]}
                      onChange={e=>set("fitting_height_"+eye,e.target.value)} placeholder="0.0" />
                    <span className="fit-unit">มม.</span>
                  </div>
                ))}
              </div>
              <div className="field" style={{marginTop:12}}>
                <label>หมายเหตุ / Additional Notes</label>
                <textarea value={form.prescription_note} onChange={e=>set("prescription_note",e.target.value)} placeholder="หมายเหตุ..." />
              </div>
            </div>

            {/* 3 */}
            <div className="sec">
              <div className="sec-title"><span className="sec-num">3</span>รายละเอียดแว่นตา</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
                <div>
                  <div className="sub">3.1 👓 กรอบแว่น</div>
                  <div className="field" style={{marginBottom:10}}>
                    <label>ยี่ห้อ / รุ่น</label>
                    <input value={form.frame_brand} onChange={e=>set("frame_brand",e.target.value)} placeholder="ระบุยี่ห้อ / รุ่น" />
                  </div>
                  <div className="sub" style={{marginTop:6}}>ประเภทกรอบ</div>
                  <div className="tog-row">
                    {FRAME_TYPES.map(t=>(
                      <button key={t} className={"tog-btn"+(form.frame_type===t?" on":"")}
                        onClick={()=>set("frame_type",form.frame_type===t?"":t)}>{t}</button>
                    ))}
                  </div>
                </div>
                <div>
                  <div className="sub">3.4 🎯 การใช้งานหลัก</div>
                  <div className="tog-row">
                    {USAGE_TYPES.map(u=>(
                      <button key={u} className={"tog-btn"+(form.usage===u?" on":"")}
                        onClick={()=>set("usage",form.usage===u?"":u)}>{u}</button>
                    ))}
                  </div>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginTop:16}}>
                <div>
                  <div className="sub">3.2 ประเภทเลนส์</div>
                  <div className="chk-row">
                    <Chk label="Single Vision (เลนส์เดี่ยว)" checked={form.lens_single} onChange={()=>tog("lens_single")} />
                    <Chk label="Progressive (โปรเกรสซีฟ)" checked={form.lens_progressive} onChange={()=>tog("lens_progressive")} />
                    <Chk label="Bifocal (เลนส์สองชั้น)" checked={form.lens_bifocal} onChange={()=>tog("lens_bifocal")} />
                    <Chk label="Office Lens (เลนส์ออฟฟิศ)" checked={form.lens_office} onChange={()=>tog("lens_office")} />
                    <Chk label="CR-39" checked={form.lens_cr39} onChange={()=>tog("lens_cr39")} />
                  </div>
                  <div className="other-row">
                    <span className="other-lbl">อื่นๆ</span>
                    <input className="other-in" value={form.lens_other} onChange={e=>set("lens_other",e.target.value)} placeholder="ระบุ..." />
                  </div>
                </div>
                <div>
                  <div className="sub">3.3 วัสดุเลนส์</div>
                  <div className="chk-row">
                    <Chk label="CR-39" checked={form.mat_cr39} onChange={()=>tog("mat_cr39")} />
                    <Chk label="Polycarbonate" checked={form.mat_poly} onChange={()=>tog("mat_poly")} />
                    <Chk label="1.56" checked={form.mat_156} onChange={()=>tog("mat_156")} />
                    <Chk label="1.60" checked={form.mat_160} onChange={()=>tog("mat_160")} />
                    <Chk label="1.67" checked={form.mat_167} onChange={()=>tog("mat_167")} />
                  </div>
                  <div className="other-row">
                    <span className="other-lbl">อื่นๆ</span>
                    <input className="other-in" value={form.mat_other} onChange={e=>set("mat_other",e.target.value)} placeholder="ระบุ..." />
                  </div>
                </div>
              </div>
              <div style={{marginTop:16}}>
                <div className="sub">🛡️ สารเคลือบเลนส์ (Coating)</div>
                <div className="chk-grid">
                  <Chk label="Anti-Reflection (AR)" checked={form.coat_ar} onChange={()=>tog("coat_ar")} />
                  <Chk label="Anti-Scratch" checked={form.coat_scratch} onChange={()=>tog("coat_scratch")} />
                  <Chk label="Blue Block" checked={form.coat_blue} onChange={()=>tog("coat_blue")} />
                  <Chk label="Photochromic (เปลี่ยนสี)" checked={form.coat_photo} onChange={()=>tog("coat_photo")} />
                  <Chk label="UV Protection" checked={form.coat_uv} onChange={()=>tog("coat_uv")} />
                </div>
                <div className="other-row">
                  <span className="other-lbl">อื่นๆ</span>
                  <input className="other-in" value={form.coat_other} onChange={e=>set("coat_other",e.target.value)} placeholder="ระบุ..." />
                </div>
              </div>
            </div>

            {/* 4 */}
            <div className="sec">
              <div className="sec-title"><span className="sec-num">4</span>ราคาสินค้าและการจำหน่าย</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
                <table className="price-tbl">
                  <tbody>
                    {[["ราคากรอบแว่น","price_frame"],["ราคาเลนส์","price_lens"],["ส่วนลด","price_discount"],["ชำระแล้ว","price_deposit"],["คงค้างชำระ","price_balance"]].map(([lbl,k])=>(
                      <tr key={k}>
                        <td>{lbl}</td>
                        <td>
                          <input className="price-in" type="number" value={form[k]} onChange={e=>set(k,e.target.value)} placeholder="0" />
                          <span className="price-unit">บาท</span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                <div className="field">
                  <label>หมายเหตุเพิ่มเติม</label>
                  <textarea value={form.extra_note} onChange={e=>set("extra_note",e.target.value)} placeholder="หมายเหตุ..." style={{minHeight:130}} />
                </div>
              </div>
            </div>

            {/* 5 */}
            <div className="sec">
              <div className="sec-title"><span className="sec-num">5</span>รูปภาพสินค้า</div>
              <div className="photo-grid">
                {[1,2].map(n=>{
                  const key="photo"+n;
                  const galId="gal-"+n;
                  const handleFile=(e)=>{
                    const file=e.target.files[0];
                    if(!file) return;
                    const reader=new FileReader();
                    reader.onload=ev=>set(key,ev.target.result);
                    reader.readAsDataURL(file);
                    e.target.value="";
                  };
                  return (
                    <div key={n} style={{display:"flex",flexDirection:"column",gap:6}}>
                      <input id={galId} type="file" accept="image/*" className="photo-input" onChange={handleFile} />
                      <div className="photo-slot" onClick={()=>document.getElementById(galId).click()}>
                        {form[key] ? (
                          <>
                            <img src={form[key]} alt={"สินค้า "+n} />
                            <button className="photo-del" onClick={e=>{e.stopPropagation();set(key,"");}}>✕</button>
                          </>
                        ) : (
                          <>
                            <span className="photo-slot-ico">🖼️</span>
                            <span className="photo-slot-label">รูปสินค้า {n}<br/>แตะเพื่อเลือกรูป</span>
                          </>
                        )}
                      </div>
                      {form[key] && (
                        <button style={{padding:"7px",border:"1px solid #ddd6cc",borderRadius:7,background:"#f3f0ea",color:"#7a6650",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}
                          onClick={()=>document.getElementById(galId).click()}>
                          🔄 เปลี่ยนรูป
                        </button>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="save-row">
              <button className="btn-cancel" onClick={goBack}>ยกเลิก</button>
              <button className="btn-save" onClick={handleSave} disabled={saving||!form.name.trim()}>
                {saving?"⏳ กำลังบันทึก...":"💾 บันทึกข้อมูล"}
              </button>
            </div>
          </div>
        )}

        {/* DETAIL */}
        {view==="detail" && selected!==null && records[selected] && (()=>{
          const r=records[selected];
          const lensTypes=[r.lens_single&&"Single Vision",r.lens_progressive&&"Progressive",r.lens_bifocal&&"Bifocal",r.lens_office&&"Office Lens",r.lens_cr39&&"CR-39",r.lens_other].filter(Boolean);
          const mats=[r.mat_cr39&&"CR-39",r.mat_poly&&"Polycarbonate",r.mat_156&&"1.56",r.mat_160&&"1.60",r.mat_167&&"1.67",r.mat_other].filter(Boolean);
          const coats=[r.coat_ar&&"AR",r.coat_scratch&&"Anti-Scratch",r.coat_blue&&"Blue Block",r.coat_photo&&"Photochromic",r.coat_uv&&"UV Protection",r.coat_other].filter(Boolean);
          return (
            <div className="dwrap">
              <div className="dhdr">
                <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                  <button className="btn-back" onClick={goBack}>← กลับ</button>
                  <div>
                    <div className="dname">{r.name}</div>
                    <div className="dmeta">อายุ {r.age||"—"} ปี · {r.gender||"—"} · 📞 {r.phone||"—"} · {r.date||"—"}</div>
                  </div>
                </div>
                <div className="dacts">
                  <button className="btn-edit" onClick={()=>{setForm(r);setView("form");}}>✏️ แก้ไข</button>
                  <button className="btn-del" onClick={()=>handleDelete(selected)}>🗑 ลบ</button>
                </div>
              </div>
              <div className="dsec">
                <div className="dsec-title">ค่าสายตาเดิม</div>
                <div style={{overflowX:"auto"}}>
                  <table className="ptable" style={{minWidth:560,fontSize:12}}>
                    <thead><tr><th>ตา</th>{PH.map(h=><th key={h}>{h}</th>)}</tr></thead>
                    <tbody>{["r","l"].map(eye=>(
                      <tr key={eye}>
                        <td className="eye-lbl">{eye==="r"?"R (ขวา)":"L (ซ้าย)"}</td>
                        {PF.map(f=><td key={f} style={{textAlign:"center",padding:"5px",fontSize:13}}>{r["prev_"+eye+"_"+f]||"—"}</td>)}
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
              <div className="dsec">
                <div className="dsec-title">ค่าสายตาใหม่</div>
                <div style={{overflowX:"auto"}}>
                  <table className="ptable" style={{minWidth:560,fontSize:12}}>
                    <thead><tr><th>ตา</th>{PH.map(h=><th key={h}>{h}</th>)}</tr></thead>
                    <tbody>{["r","l"].map(eye=>(
                      <tr key={eye}>
                        <td className="eye-lbl">{eye==="r"?"R (ขวา)":"L (ซ้าย)"}</td>
                        {PF.map(f=><td key={f} style={{textAlign:"center",padding:"5px",fontSize:13}}>{r["cur_"+eye+"_"+f]||"—"}</td>)}
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
                <div className="dgrid" style={{marginTop:10}}>
                  <div className="ditem"><label>Fitting Height ขวา</label><span>{r.fitting_height_r||"—"} มม.</span></div>
                  <div className="ditem"><label>Fitting Height ซ้าย</label><span>{r.fitting_height_l||"—"} มม.</span></div>
                </div>
                {r.prescription_note&&<div style={{marginTop:8,fontSize:13,color:"#8c7d6b"}}>📝 {r.prescription_note}</div>}
              </div>
              <div className="dsec">
                <div className="dsec-title">รายละเอียดแว่นตา</div>
                <div className="dgrid">
                  <div className="ditem"><label>ยี่ห้อ/รุ่น</label><span>{r.frame_brand||"—"}</span></div>
                  <div className="ditem"><label>ประเภทกรอบ</label><span>{r.frame_type||"—"}</span></div>
                  <div className="ditem"><label>การใช้งาน</label><span>{r.usage||"—"}</span></div>
                </div>
                <div style={{marginTop:10}}>
                  <div style={{fontSize:11,color:"#8c7d6b",textTransform:"uppercase",letterSpacing:".5px",marginBottom:5}}>ประเภทเลนส์</div>
                  <div className="dchips">{lensTypes.length?lensTypes.map(l=><span key={l} className="chip">{l}</span>):<span style={{fontSize:13,color:"#8c7d6b"}}>—</span>}</div>
                </div>
                <div style={{marginTop:8}}>
                  <div style={{fontSize:11,color:"#8c7d6b",textTransform:"uppercase",letterSpacing:".5px",marginBottom:5}}>วัสดุเลนส์</div>
                  <div className="dchips">{mats.length?mats.map(m=><span key={m} className="chip">{m}</span>):<span style={{fontSize:13,color:"#8c7d6b"}}>—</span>}</div>
                </div>
                <div style={{marginTop:8}}>
                  <div style={{fontSize:11,color:"#8c7d6b",textTransform:"uppercase",letterSpacing:".5px",marginBottom:5}}>สารเคลือบ</div>
                  <div className="dchips">{coats.length?coats.map(c=><span key={c} className="chip">{c}</span>):<span style={{fontSize:13,color:"#8c7d6b"}}>—</span>}</div>
                </div>
              </div>
              <div className="dsec">
                <div className="dsec-title">ราคา</div>
                <div className="dgrid">
                  {[["ราคากรอบ","price_frame"],["ราคาเลนส์","price_lens"],["ส่วนลด","price_discount"],["ชำระแล้ว","price_deposit"],["คงค้างชำระ","price_balance"]].map(([lbl,k])=>(
                    <div className="ditem" key={k}>
                      <label>{lbl}</label>
                      <span style={k==="price_balance"&&r[k]&&r[k]!=="0"?{color:"#a83232",fontWeight:700}:{}}>{r[k]?Number(r[k]).toLocaleString()+" บาท":"—"}</span>
                    </div>
                  ))}
                </div>
                {r.extra_note&&<div style={{marginTop:8,fontSize:13,color:"#8c7d6b"}}>📝 {r.extra_note}</div>}
              </div>
              {(r.photo1||r.photo2)&&(
                <div className="dsec">
                  <div className="dsec-title">รูปภาพสินค้า</div>
                  <div className="photo-grid">
                    {[1,2].map(n=>r["photo"+n]?(
                      <div key={n} className="photo-slot" style={{cursor:"default"}}>
                        <img src={r["photo"+n]} alt={"สินค้า "+n} />
                      </div>
                    ):null)}
                  </div>
                </div>
              )}
            </div>
          );
        })()}
      </>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
